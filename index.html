<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bower Vintage Card Vault</title>

<style>

body{

  margin:0;

  font-family:Arial, Helvetica, sans-serif;

  background:#f6f1e8;

  color:#2b2118;

}

header{

  background:#6b1e1e;

  color:white;

  text-align:center;

  padding:26px 16px;

}

header h1{

  margin:0;

  font-size:28px;

}

header p{

  margin:8px 0 0;

  font-size:14px;

}

nav{

  text-align:center;

  padding:16px;

  background:#efe3d2;

}

button{

  margin:5px;

  padding:10px 18px;

  border:none;

  border-radius:8px;

  background:#6b1e1e;

  color:white;

  font-size:14px;

  cursor:pointer;

}

button:hover{

  background:#8b2b2b;

}

#searchBox{

  display:block;

  margin:16px auto;

  padding:11px;

  width:90%;

  max-width:520px;

  font-size:15px;

  border-radius:8px;

  border:1px solid #aaa;

}

#summary{

  text-align:center;

  font-weight:bold;

  margin:12px;

}

#cards{

  display:grid;

  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));

  gap:20px;

  padding:22px;

  max-width:1200px;

  margin:auto;

}

.card{

  background:white;

  border-radius:14px;

  box-shadow:0 3px 12px rgba(0,0,0,.16);

  padding:13px;

  text-align:left;

}

.card img{

  width:100%;

  height:230px;

  object-fit:contain;

  background:#fafafa;

  border-radius:10px;

}

.card h3{

  font-size:17px;

  margin:11px 0 6px;

  color:#6b1e1e;

}

.meta{

  font-size:13px;

  color:#555;

  margin:4px 0;

}

.price{

  margin-top:8px;

  font-size:20px;

  color:#0f6b2b;

  font-weight:bold;

}

.badge{

  display:inline-block;

  margin-top:7px;

  padding:4px 8px;

  border-radius:999px;

  background:#efe3d2;

  font-size:12px;

  color:#5a3b20;

}

</style>

</head>

<body>

<header>

  <h1>🏆 Bower Vintage Card Vault</h1>

  <p>Searchable collection powered by Google Sheets and GitHub images</p>

</header>

<nav>

  <button onclick="loadVault('collection')">Collection</button>

  <button onclick="loadVault('mantle')">Mantle Wing</button>

  <button onclick="loadVault('graded')">Graded Cards</button>

</nav>

<input id="searchBox" placeholder="Search player, year, company, grade..." onkeyup="searchVault()">

<div id="summary">Choose a section above.</div>

<div id="cards"></div>

<script>

const SHEETS = {

  collection: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV7ChVBPYdSjWQLF59zz6zBh-eAJFy4Cyr5pj71R6OGUkhVCjpJf-7FqjuypDAX-advzSjqwR3N6KL/pub?gid=2143494676&single=true&output=csv",

  mantle: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV7ChVBPYdSjWQLF59zz6zBh-eAJFy4Cyr5pj71R6OGUkhVCjpJf-7FqjuypDAX-advzSjqwR3N6KL/pub?gid=2034525918&single=true&output=csv",

  graded: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV7ChVBPYdSjWQLF59zz6zBh-eAJFy4Cyr5pj71R6OGUkhVCjpJf-7FqjuypDAX-advzSjqwR3N6KL/pub?gid=1360818986&single=true&output=csv"

};

let allCards = [];

let currentSection = "";

function loadVault(section){

  currentSection = section;

  document.getElementById("summary").innerHTML = "Loading...";

  fetch(SHEETS[section])

    .then(response => response.text())

    .then(csv => {

      allCards = parseCSV(csv);

      showCards(allCards);

    })

    .catch(error => {

      document.getElementById("summary").innerHTML = "Error loading sheet.";

      console.error(error);

    });

}

function parseCSV(csv){

  const rows = [];

  let row = [];

  let cell = "";

  let inQuotes = false;

  for(let i = 0; i < csv.length; i++){

    const char = csv[i];

    const next = csv[i + 1];

    if(char === '"' && inQuotes && next === '"'){

      cell += '"';

      i++;

    } else if(char === '"'){

      inQuotes = !inQuotes;

    } else if(char === ',' && !inQuotes){

      row.push(cell);

      cell = "";

    } else if((char === "\n" || char === "\r") && !inQuotes){

      if(cell !== "" || row.length > 0){

        row.push(cell);

        rows.push(row);

        row = [];

        cell = "";

      }

      if(char === "\r" && next === "\n") i++;

    } else {

      cell += char;

    }

  }

  if(cell !== "" || row.length > 0){

    row.push(cell);

    rows.push(row);

  }

  const headers = rows.shift().map(h => h.trim());

  return rows.map(r => {

    const obj = {};

    headers.forEach((header, index) => {

      obj[header] = r[index] ? r[index].trim() : "";

    });

    return obj;

  });

}

function imagePath(card){

  const id = card["ID"] || "";

  const base = card["BASE NAME"] || "";

  return `images/${id}_${base}_1.jpg`;

}

function showCards(cards){

  const container = document.getElementById("cards");

  container.innerHTML = "";

  document.getElementById("summary").innerHTML =

    `${cards.length} records showing from ${sectionName(currentSection)}`;

  cards.forEach(card => {

    const photo = imagePath(card);

    let value = "";

    if(currentSection === "mantle"){

      value = card["EST GRADED VALUE"] || card["EST VALUE"] || "";

    } else {

      value = card["EST VALUE"] || card["EST GRADED VALUE"] || "";

    }

    const player = card["PLAYER"] || "";

    const year = card["YEAR"] || "";

    const company = card["FILTER_CO"] || card["COMPANY"] || "";

    const sport = card["FILTER_SPORT"] || card["SPORT"] || "";

    const era = card["FILTER_ERA"] || "";

    const grade = card["EST GRADE"] || "";

    const status = card["GRADE STATUS"] || "";

    container.innerHTML += `

      <div class="card">

        <a href="${photo}" target="_blank">

          <img src="${photo}" onerror="this.style.display='none'">

        </a>

        <h3>${player}</h3>

        <div class="meta"><strong>${year} ${company}</strong></div>

        <div class="meta">${sport}${era ? " • " + era : ""}</div>

        <div class="meta">${grade}</div>

        <div class="price">${value}</div>

        <div class="badge">${status}</div>

      </div>

    `;

  });

}

function searchVault(){

  const q = document.getElementById("searchBox").value.toLowerCase();

  const filtered = allCards.filter(card =>

    JSON.stringify(card).toLowerCase().includes(q)

  );

  showCards(filtered);

}

function sectionName(section){

  if(section === "mantle") return "Mantle Wing";

  if(section === "graded") return "Graded Cards";

  return "Collection";

}

</script>

</body>

</html></html>
