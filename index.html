<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bower Vintage Card Vault</title>

<style>

body{

    margin:0;

    font-family:Arial,Helvetica,sans-serif;

    background:#f6f3ef;

    color:#333;

}

header{

    background:#6b1e1e;

    color:white;

    text-align:center;

    padding:30px;

}

button{

    background:#6b1e1e;

    color:white;

    border:none;

    padding:10px 20px;

    border-radius:6px;

    cursor:pointer;

}

button:hover{

    background:#8b2b2b;

}

input{

    width:420px;

    max-width:90%;

    padding:10px;

    margin:20px;

    font-size:16px;

}

#summary{

    margin-bottom:20px;

    font-weight:bold;

}

#cards{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));

    gap:20px;

    padding:20px;

    max-width:1300px;

    margin:auto;

}

.card{

    background:white;

    border-radius:12px;

    box-shadow:0 3px 10px rgba(0,0,0,.15);

    padding:18px;

}

.card img{

    width:100%;

    height:360px;

    object-fit:contain;

    border-radius:8px;

    background:#fafafa;

}

.card h3{

    margin:12px 0;

}

.price{

    font-size:22px;

    color:#6b1e1e;

    font-weight:bold;

}

</style>

</head>

<body>

<header>

<h1>🏆 Bower Vintage Card Vault</h1>

<p>Searchable collection powered by Google Sheets</p>

</header>

<div style="text-align:center;padding:25px;">

<button onclick="loadVault()">Load Collection</button><br>

<input

id="searchBox"

placeholder="Search player, year, company..."

onkeyup="searchVault()">

<div id="summary"></div>

</div>

<div id="cards"></div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQV7ChVBPYdSjWQLF59zz6zBh-eAJFy4Cyr5pj71R6OGUkhVCjpJf-7FqjuypDAX-advzSjqwR3N6KL/pub?gid=2143494676&single=true&output=csv";

let allRows=[];

function loadVault(){

fetch(SHEET_URL)

.then(r=>r.text())

.then(text=>{

const rows=text.trim().split("\n").map(r=>r.split(","));

const headers=rows.shift();

allRows=rows.map(r=>{

let obj={};

headers.forEach((h,i)=>{

obj[h.trim()]=r[i];

});

return obj;

});

showRows(allRows);

});

}

function showRows(rows){

document.getElementById("summary").innerHTML=

"Showing "+rows.length+" cards";

let html="";

rows.forEach(card=>{

let id = card["ID"] || "";

let baseName = card["BASE NAME"] || "";

let photo = `images/${id}_${baseName}_1.jpg`;

html +=`

<div class="card">

<a href="${photo}" target="_blank">

<img src="${photo}">

</a>

<h3>${card["PLAYER"] || ""}</h3>

<div><strong>${card["YEAR"] || ""} ${card["FILTER_CO"] || ""}</strong></div>

<div>${card["FILTER_SPORT"] || ""} • ${card["FILTER_ERA"] || ""}</div>

<div>${card["EST GRADE"] || ""}</div>

<div class="price">$${card["EST VALUE"] || ""}</div>

<div style="font-size:12px;color:#777;">${card["GRADE STATUS"] || ""}</div>

`;

})

document.getElementById("cards").innerHTML=html;

}

function searchVault(){

const q=document.getElementById("searchBox").value.toLowerCase();

const filtered=allRows.filter(r=>

JSON.stringify(r).toLowerCase().includes(q)

);

showRows(filtered);

}

</script>

</body>

</html>
