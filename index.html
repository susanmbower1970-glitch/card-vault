<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bower Vintage Card Vault</title>

<style>

body{

  margin:0;

  font-family:Arial,Helvetica,sans-serif;

  background:#f6f1e8;

  color:#2b2118;

}

header{

  background:#6b1e1e;

  color:white;

  text-align:center;

  padding:28px 16px;

}

nav{

  text-align:center;

  padding:18px;

  background:#efe3d2;

}

button{

  margin:6px;

  padding:10px 18px;

  border:none;

  border-radius:8px;

  background:#6b1e1e;

  color:white;

  font-size:15px;

  cursor:pointer;

}

button:hover{

  background:#8b2b2b;

}

#searchBox{

  display:block;

  margin:18px auto;

  padding:12px;

  width:90%;

  max-width:520px;

  font-size:16px;

  border-radius:8px;

  border:1px solid #aaa;

}

#summary{

  text-align:center;

  font-weight:bold;

  margin:15px;

}

#cards{

  display:grid;

  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));

  gap:20px;

  padding:22px;

  max-width:1250px;

  margin:auto;

}

.card{

  background:white;

  border-radius:14px;

  box-shadow:0 3px 12px rgba(0,0,0,.16);

  padding:14px;

  text-align:left;

}

.card img{

  width:100%;

  height:240px;

  object-fit:contain;

  background:#fafafa;

  border-radius:10px;

}

.card h3{

  font-size:18px;

  margin:12px 0 6px;

  color:#6b1e1e;

}

.meta{

  font-size:14px;

  color:#555;

  margin:4px 0;

}

.price{

  margin-top:10px;

  font-size:21px;

  color:#0f6b2b;

  font-weight:bold;

}

.badge{

  display:inline-block;

  margin-top:8px;

  padding:4px 8px;

  border-radius:999px;

  background:#efe3d2;

  font-size:12px;

  color:#5a3b20;

}

</style>

</head>

<body>

<header>

  <h1>🏆 Bower Vintage Card Vault</h1>

  <p>Searchable collection powered by Google Sheets and GitHub images</p>

</header>

<nav>

  <button onclick="loadVault('collection')">Collection</button>

  <button onclick="loadVault('mantle')">Mantle Wing</button>

</nav>

<input id="searchBox" placeholder="Search player, year, company, grade..." onkeyup="searchVault()">

<div id="summary">Choose a section above.</div>

<div id="cards"></div>

<script>

const SHEETS = {

  collection: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV7ChVBPYdSjWQLF59zz6zBh-eAJFy4Cyr5pj71R6OGUkhVCjpJf-7FqjuypDAX-advzSjqwR3N6KL/pub?gid=2143494676&single=true&output=csv",

  mantle: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV7ChVBPYdSjWQLF59zz6zBh-eAJFy4Cyr5pj71R6OGUkhVCjpJf-7FqjuypDAX-advzSjqwR3N6KL/pub?gid=2034525918&single=true&output=csv"

};

let allCards = [];

let currentSection = "";

function loadVault(section){

  currentSection = section;

  fetch(SHEETS[section])

    .then(response => response.text())

    .then(csv => {

      allCards = parseCSV(csv);

      showCards(allCards);

    });

}

function parseCSV(csv){

  const rows = [];

  let currentRow = [];

  let currentValue = "";

  let insideQuotes = false;

  for(let i = 0; i < csv.length; i++){

    const char = csv[i];

    const nextChar = csv[i + 1];

    if(char === '"' && insideQuotes && nextChar === '"'){

      currentValue += '"';

      i++;

    } else if(char === '"'){

      insideQuotes = !insideQuotes;

    } else if(char === ',' && !insideQuotes){

      currentRow.push(currentValue.trim());

      currentValue = "";

    } else if((char === '\n' || char === '\r') && !insideQuotes){

      if(currentValue || currentRow.length){

        currentRow.push(currentValue.trim());

        rows.push(currentRow);

        currentRow = [];

        currentValue = "";

      }

      if(char === '\r' && nextChar === '\n') i++;

    } else {

      currentValue += char;

    }

  }

  if(currentValue || currentRow.length){

    currentRow.push(currentValue.trim());

    rows.push(currentRow);

  }

  const headers = rows.shift().map(h => h.trim());

  return rows.map(row => {

    let obj = {};

    headers.forEach((header, i) => {

      obj[header] = row[i] ? row[i].trim() : "";

    });

    return obj;

  });

}

}

function imagePath(card){

  const id = card["ID"] || "";

  const base = card["BASE NAME"] || "";

  return `images/${id}_${base}_1.jpg`;

}

function showCards(cards){

  const container = document.getElementById("cards");

  container.innerHTML = "";

  document.getElementById("summary").innerHTML =

    `${cards.length} records showing from ${sectionName(currentSection)}`;

  cards.forEach(card => {

    const photo = imagePath(card);

    const value = currentSection === "mantle"

  ? (card["EST GRADED VALUE"] || card["EST VALUE"] || "")

  : (card["EST VALUE"] || card["EST GRADED VALUE"] || "");

    const player = card["PLAYER"] || "";

    const year = card["YEAR"] || "";

    const company = card["FILTER_CO"] || card["COMPANY"] || "";

    const sport = card["FILTER_SPORT"] || card["SPORT"] || "";

    const era = card["FILTER_ERA"] || "";

    const grade = card["EST GRADE"] || "";

    const status = card["GRADE STATUS"] || "";

    container.innerHTML += `

      <div class="card">

        <a href="${photo}" target="_blank">

          <img src="${photo}" onerror="this.style.display='none'">

        </a>

        <h3>${player}</h3>

        <div class="meta"><strong>${year} ${company}</strong></div>

        <div class="meta">${sport} ${era ? "• " + era : ""}</div>

        <div class="meta">${grade}</div>

        <div class="price">${value}</div>

        <div class="badge">${status}</div>

      </div>

    `;

  });

}

function searchVault(){

  const q = document.getElementById("searchBox").value.toLowerCase();

  const filtered = allCards.filter(card =>

    JSON.stringify(card).toLowerCase().includes(q)

  );

  showCards(filtered);

}

function sectionName(section){

  if(section === "mantle") return "Mantle Wing";

  return "Collection";

}

</script>

</body>

</html>
