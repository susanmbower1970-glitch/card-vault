<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bower Vintage Card Vault</title>
<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4efe4;
    color: #2b2118;
}
header {
    background: #7b1e1e;
    color: white;
    text-align: center;
    padding: 34px 20px;
}
header h1 {
    margin: 0 0 8px;
    font-size: 34px;
}
header p {
    margin: 0;
    font-size: 15px;
}
main {
    max-width: 1200px;
    margin: auto;
    padding: 28px 18px 60px;
    text-align: center;
}
button {
    padding: 12px 24px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #7b1e1e;
    background: #7b1e1e;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #5f1717;
}
#searchBox {
    margin-top: 18px;
    padding: 12px;
    width: 85%;
    max-width: 560px;
    font-size: 17px;
    border-radius: 8px;
    border: 1px solid #9b8c79;
}
#summary {
    margin: 22px;
    font-size: 17px;
    font-weight: bold;
}
#cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    text-align: left;
    box-shadow: 0 3px 12px rgba(0,0,0,.18);
    border-top: 6px solid #7b1e1e;
}
.card img {
    width: 100%;
    height: 300px;
    object-fit: contain;
    border-radius: 8px;
    background: #f8f8f8;
    margin-bottom: 12px;
    border: 1px solid #eee;
}
.card h3 {
    margin: 6px 0 8px;
    color: #7b1e1e;
    font-size: 18px;
}
.card p {
    margin: 6px 0;
    font-size: 14px;
    line-height: 1.35;
}
.value {
    font-size: 20px !important;
    font-weight: bold;
    color: #2b2118;
}
.small {
    color: #666;
    font-size: 13px !important;
}
</style>
</head>

<body>
<header>
    <h1>🏆 Bower Vintage Card Vault</h1>
    <p>Searchable collection viewer powered by Google Sheets.</p>
</header>

<main>
    <h2>Card Viewer</h2>

    <button onclick="loadVault()">Load The Vault</button>

    <br>

    <input id="searchBox" onkeyup="searchVault()" placeholder="Search Mantle, Topps, 1975, PSA, Jordan...">

    <div id="summary">Click “Load The Vault” to begin.</div>

    <div id="cards"></div>
</main>

<script>
let allRows = [];

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV7ChVBPYdSjWQLF59zz6zBh-eAJFy4Cyr5pj71R6OGUkhVCjpJf-7FqjuypDAX-advzSjqwR3N6KL/pub?gid=2143494676&single=true&output=csv";

function loadVault() {
    fetch(SHEET_URL)
    .then(response => response.text())
    .then(data => {
        allRows = parseCSV(data);
        showRows(allRows);
    })
    .catch(error => {
        document.getElementById("summary").innerHTML = "Could not load the Google Sheet.";
        console.error(error);
    });
}

function parseCSV(text) {
    let rows = [];
    let current = [];
    let value = "";
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
        let char = text[i];
        let next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
            value += '"';
            i++;
        } else if (char === '"') {
            insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
            current.push(value);
            value = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
            if (value || current.length) {
                current.push(value);
                rows.push(current);
                current = [];
                value = "";
            }
        } else {
            value += char;
        }
    }

    if (value || current.length) {
        current.push(value);
        rows.push(current);
    }

    return rows;
}

function driveThumbnail(url) {
    if (!url) return "";
    let match = url.match(/\/d\/([^/]+)/);
    if (!match) return url;
    return "https://drive.google.com/thumbnail?id=" + match[1] + "&sz=w800";
}

function showRows(rows) {
    let cards = document.getElementById("cards");
    cards.innerHTML = "";

    let displayRows = rows.filter(row => row.join("").trim() !== "");

    document.getElementById("summary").innerHTML =
        "Showing " + Math.max(displayRows.length - 1, 0) + " records from the live COLLECTION tab";

    displayRows.forEach((row, index) => {
        if (index === 0) return;

        let company = row[0] || "";
        let sport = row[1] || "";
        let era = row[2] || "";
        let player = row[3] || "Unknown Player";
        let year = row[4] || "";
        let rookie = row[5] || "";
        let cardNumber = row[6] || "";
        let photoLink = row[7] || "";
        let value = row[11] || "";
        let gradeStatus = row[15] || "";
        let valueConfidence = row[16] || "";

        let imageUrl = driveThumbnail(photoLink);

        cards.innerHTML += `
        <div class="card">
            <a href="${photoLink}" target="_blank">
                <img src="${imageUrl}" alt="${year} ${player}">
            </a>
            <h3>${year} ${player}</h3>
            <p><strong>${company}</strong> • ${sport} • ${era}</p>
            <p>Card #: ${cardNumber}</p>
            <p>Rookie: ${rookie}</p>
            <p class="value">${value}</p>
            <p class="small">${gradeStatus} ${valueConfidence}</p>
        </div>
        `;
    });
}

function searchVault() {
    let search = document.getElementById("searchBox").value.toLowerCase();

    let filtered = allRows.filter((row, index) => {
        if (index === 0) return true;
        return row.join(" ").toLowerCase().includes(search);
    });

    showRows(filtered);
}
</script>

</body>
</html>
